<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — IKEDA</title>
  <meta name="description" content="池田のブログ。考えていること、つくったこと、日々のメモ。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <noscript><style>.reveal{opacity:1;transform:none}</style></noscript>
</head>
<body data-page="blog">
  <div class="fx" aria-hidden="true">
    <div class="orb orb--1"></div><div class="orb orb--2"></div><div class="orb orb--3"></div>
  </div>
  <div id="cursor" aria-hidden="true"></div>

  <header class="nav" id="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html">IKEDA<span class="nav__dot">.</span></a>
      <button class="nav__toggle" id="navToggle" aria-controls="navMenu" aria-expanded="false" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav__menu" id="navMenu">
        <a href="index.html#work">Work</a>
        <a href="index.html#approach">Approach</a>
        <a href="blog.html" data-nav="blog">Blog</a>
        <a href="sns.html" class="nav__sub" data-nav="sns">つぶやき</a>
        <a href="index.html#contact" class="nav__cta">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap" style="padding-top: calc(var(--nav-h) + 60px)">
    <div class="reveal">
      <p class="eyebrow">Journal / ブログ</p>
      <h1 class="section__title display">考えていること。</h1>
      <p class="section__lead">つくったこと、気づいたこと、日々のメモ。書きたいときに書く。</p>
    </div>

    <div style="margin-top: 48px">
      <section class="editor reveal">
        <div class="editor__head" id="editorHead" role="button" tabindex="0" aria-expanded="true" aria-controls="blogForm">
          <h2>＋ 記事を書く</h2>
          <span class="editor__toggle" id="editorToggle">閉じる</span>
        </div>
        <form class="editor__body" id="blogForm" novalidate>
          <div class="field">
            <label for="blogTitle">Title / タイトル</label>
            <input id="blogTitle" type="text" maxlength="80" placeholder="タイトルを入力" required>
          </div>
          <div class="field">
            <label for="blogTag">Tag / タグ（任意）</label>
            <input id="blogTag" type="text" maxlength="20" placeholder="例）Design / Data / Note">
          </div>
          <div class="field">
            <label for="blogBody">Body / 本文</label>
            <textarea id="blogBody" rows="8" placeholder="本文を入力。改行はそのまま反映されます。" required></textarea>
          </div>
          <div class="editor__foot">
            <p class="editor__note">下書きも公開もこのブラウザ内に保存されます。</p>
            <button type="submit" class="btn btn--grad" id="blogSubmit">投稿する</button>
          </div>
        </form>
      </section>

      <div id="articles"></div>

      <div id="blogEmpty" class="empty" hidden>
        <span class="empty__emoji">✎</span>
        <p class="empty__title">まだ記事がありません</p>
        <p class="empty__text">上の「＋ 記事を書く」から最初の一本を。</p>
        <p style="margin-top:16px"><button class="btn btn--ghost btn--sm" id="blogSeed">サンプル記事を入れる</button></p>
      </div>
    </div>
  </main>

  <footer class="footer" style="margin-top: 100px">
    <div class="wrap">
      <div class="footer__inner">
        <div>
          <div class="footer__brand">IKEDA<span class="dot">.</span></div>
          <p class="footer__tag">経営戦略を、かたちにする。</p>
        </div>
        <div class="footer__col">
          <h4>Menu</h4>
          <a href="index.html#work">Work</a>
          <a href="index.html#approach">Approach</a>
          <a href="blog.html">Blog</a>
          <a href="index.html#contact">Contact</a>
        </div>
        <div class="footer__col">
          <h4>More</h4>
          <a href="sns.html">つぶやき</a>
          <a href="mailto:bokuopiemon@gmail.com">Email</a>
        </div>
      </div>
      <div class="footer__bottom"><span>&copy; 2026 IKEDA</span><span>Designed &amp; built end-to-end.</span></div>
    </div>
  </footer>

  <template id="articleTpl">
    <article class="article reveal">
      <div class="article__meta">
        <span class="article__tag" hidden></span>
        <time class="article__date"></time>
      </div>
      <h2 class="article__title display"></h2>
      <p class="article__body is-clamped"></p>
      <div class="article__foot">
        <button class="article__more">続きを読む</button>
        <button class="article__del">削除</button>
      </div>
    </article>
  </template>

  <script src="blog.js"></script>
  <script src="common.js"></script>
</body>
</html>
